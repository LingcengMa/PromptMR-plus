data:
  class_path: pl_modules.DataModule
  init_args:
    slice_dataset: data.CmrxReconSliceDataset
    data_path: /radraid/lingcengma/data/CMRxRecon2026/TaskR1R2/TrainSet/Aorta/Center007/GE_30T_Architect/promptmr_dataset
    train_path: /radraid/lingcengma/data/CMRxRecon2026/TaskR1R2/TrainSet/Aorta/Center007/GE_30T_Architect/promptmr_dataset/train2
    val_path: /radraid/lingcengma/data/CMRxRecon2026/TaskR1R2/TrainSet/Aorta/Center007/GE_30T_Architect/promptmr_dataset/val
    challenge: multicoil
    data_balancer: null
    train_transform:
      class_path: data.CmrxReconDataTransform
      init_args:
        mask_func:
          class_path: data.CmrxRecon24MaskFunc
          init_args:
            num_low_frequencies:
            - 16
            num_adj_slices: &num_adj_slices 5
            allowed_mask_types: [kt_gaussian]
            seed: null
        uniform_resolution: null
        use_seed: false
    val_transform:
      class_path: data.CmrxReconDataTransform
      init_args:
        mask_func:
          class_path: data.CmrxRecon24MaskFunc
          init_args:
            num_low_frequencies:
            - 16
            num_adj_slices: *num_adj_slices
            allowed_mask_types: [kt_gaussian]
            seed: 1234
        uniform_resolution: null
        use_seed: true
    combine_train_val: false
    num_adj_slices: *num_adj_slices
    batch_size: 1
    distributed_sampler: true
    use_dataset_cache_file: false

# dataset specific settings
trainer:
  strategy: ddp
  devices: 1
  num_nodes: 1
  max_epochs: 12
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      save_dir: exp/cmr24-cardiac-fullsample/pmr # path to save experiment and checkpoint
      tags: [cmr24-cardiac-fullsample]
      name: cmr24-cardiac-fullsample-pmr
model:
  class_path: pl_modules.PromptMrModule
  init_args:
    lr: 0.0002
    lr_step_size: 11

ckpt_path: null
